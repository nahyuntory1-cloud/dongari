<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>음악 동아리 | 9기 미래인재성장과정</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body data-club="music">

<header class="site-header">
  <div class="header-inner">
    <div class="brand">9기 미래인재성장과정 <span>동아리</span></div>
    <nav class="site-nav">
      <a href="index.html">홈</a>
      <a href="art.html">미술</a>
      <a href="pe.html">체육</a>
      <a href="music.html" class="active">음악</a>
    </nav>
  </div>
</header>

<section class="hero">
  <span class="badge">🎵 음악 동아리</span>
  <h1>함께 연주하고 노래하는 음악 동아리</h1>
  <p>악기 연주, 합창, 작곡 등 다양한 음악 활동을 함께 즐겨요. 관심 있는 친구들의 많은 신청 기다립니다!</p>
  <button class="btn" data-open-modal="apply-modal">가입신청서 작성하기</button>
</section>

<section class="section">
  <div class="section-title">
    <h2>📌 안내사항 게시판</h2>
    <button class="btn small secondary" data-open-modal="post-modal">글쓰기</button>
  </div>
  <div id="board-list">
    <p class="empty">불러오는 중...</p>
  </div>
</section>

<footer class="site-footer">
  © 9기 미래인재성장과정 동아리 · 음악
</footer>

<!-- ===== 가입신청서 모달 ===== -->
<div class="modal-overlay" id="apply-modal">
  <div class="modal-box">
    <h3>음악 동아리 가입신청서</h3>
    <form id="apply-form">
      <div class="form-field">
        <label for="apply-name">이름</label>
        <input type="text" id="apply-name" name="name" required />
      </div>
      <div class="form-field">
        <label for="apply-sido">주소 (시/도)</label>
        <select id="apply-sido" required>
          <option value="">선택하세요</option>
        </select>
      </div>
      <div class="form-field">
        <label for="apply-sigungu">주소 (시/군/구)</label>
        <select id="apply-sigungu" required disabled>
          <option value="">선택하세요</option>
        </select>
      </div>
      <div class="form-field">
        <label for="apply-contact">연락처 (전화번호 또는 이메일)</label>
        <input type="text" id="apply-contact" name="contact" required />
      </div>
      <div class="form-field">
        <label for="apply-reason">지원 동기</label>
        <textarea id="apply-reason" name="reason" placeholder="음악 동아리에 지원하는 이유를 적어주세요."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn secondary small" data-close-modal="apply-modal">취소</button>
        <button type="submit" class="btn small">제출하기</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== 게시판 글쓰기 모달 ===== -->
<div class="modal-overlay" id="post-modal">
  <div class="modal-box">
    <h3>안내사항 작성</h3>
    <form id="post-form">
      <div class="form-field">
        <label for="post-title">제목</label>
        <input type="text" id="post-title" name="title" required />
      </div>
      <div class="form-field">
        <label for="post-author">작성자</label>
        <input type="text" id="post-author" name="author" placeholder="예: 음악 동아리 운영진" />
      </div>
      <div class="form-field">
        <label for="post-content">내용</label>
        <textarea id="post-content" name="content" required></textarea>
      </div>
      <div class="form-field">
        <label for="post-password">삭제용 비밀번호</label>
        <input type="password" id="post-password" name="password" placeholder="나중에 이 글을 삭제할 때 필요해요" required />
      </div>
      <p class="form-hint">* 이 비밀번호 또는 관리자 비밀번호로 글을 삭제할 수 있어요.</p>
      <div class="form-actions">
        <button type="button" class="btn secondary small" data-close-modal="post-modal">취소</button>
        <button type="submit" class="btn small">등록하기</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/regions.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
